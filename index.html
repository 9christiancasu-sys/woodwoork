<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Christian Hub Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; font-family: sans-serif; color: white; overflow-x: hidden; }
        .page { display: none; padding-bottom: 100px; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 20px; }
        input, select { background: rgba(255, 255, 255, 0.1) !important; border: 1px solid rgba(255, 255, 255, 0.2) !important; color: white !important; padding: 12px; border-radius: 12px; width: 100%; margin-bottom: 10px; }
        .sub-nav-btn { padding: 10px; font-size: 12px; font-weight: bold; border-radius: 10px; flex: 1; text-align: center; background: rgba(255,255,255,0.05); }
        .sub-nav-btn.active { background: #3b82f6; color: white; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <header class="p-6 sticky top-0 z-50 bg-[#0f172a]/90 backdrop-blur-md border-b border-white/10 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-bold text-blue-400" id="top-title">Christian Hub</h1>
            <p class="text-[10px] uppercase text-slate-500" id="sub-title">Dashboard Generale</p>
        </div>
        <div class="text-right">
            <p class="text-[10px] uppercase text-slate-500">Saldo Global</p>
            <p class="text-xl font-mono font-bold text-green-400" id="global-total">€ 0.00</p>
        </div>
    </header>

    <div class="p-4">
        
        <div id="page-home" class="page active">
            <div id="grid-categorie" class="grid grid-cols-1 gap-4">
                </div>
            <button onclick="openPage('page-settings')" class="w-full mt-6 p-4 glass text-slate-400 text-sm border-dashed border-2">+ Aggiungi/Gestisci Categorie</button>
        </div>

        <div id="page-sector" class="page">
            <div class="flex gap-2 mb-6" id="sector-nav">
                <button onclick="setSectorTab('bilancio')" class="sub-nav-btn active" id="btn-tab-bilancio">BILANCIO</button>
                <button onclick="setSectorTab('prodotti')" class="sub-nav-btn" id="btn-tab-prodotti">PRODOTTI</button>
                <button onclick="setSectorTab('materiali')" class="sub-nav-btn" id="btn-tab-materiali">MATERIALI</button>
            </div>

            <div id="sector-bilancio" class="sector-tab">
                <div class="glass mb-4">
                    <h4 class="text-xs font-bold text-blue-400 uppercase mb-4 text-center">Riepilogo Settore</h4>
                    <div class="flex justify-around">
                        <div class="text-center"><p class="text-[10px] text-slate-500">ENTRATE</p><p class="text-green-400 font-bold" id="cat-in">€ 0</p></div>
                        <div class="text-center"><p class="text-[10px] text-slate-500">USCITE</p><p class="text-red-400 font-bold" id="cat-out">€ 0</p></div>
                        <div class="text-center"><p class="text-[10px] text-slate-500">UTILE</p><p class="text-blue-400 font-bold" id="cat-net">€ 0</p></div>
                    </div>
                </div>
                <div id="history-all" class="space-y-2"></div>
            </div>

            <div id="sector-prodotti" class="sector-tab hidden">
                <div class="glass mb-4">
                    <h3 class="font-bold mb-4 text-sm">Registra Prodotto/Lavoro</h3>
                    <input type="text" id="prod-nome" placeholder="Nome lavoro/prodotto">
                    <input type="number" id="prod-prezzo" placeholder="Prezzo vendita (€)">
                    <button onclick="salvaItem('prodotti')" class="w-full bg-green-600 py-3 rounded-xl font-bold">SALVA VENDITA</button>
                </div>
                <div id="history-prodotti" class="space-y-2"></div>
            </div>

            <div id="sector-materiali" class="sector-tab hidden">
                <div class="glass mb-4">
                    <h3 class="font-bold mb-4 text-sm">Acquisto Materiali/Pezzi</h3>
                    <input type="text" id="mat-nome" placeholder="Cosa hai comprato?">
                    <input type="number" id="mat-costo" placeholder="Costo (€)">
                    <button onclick="salvaItem('materiali')" class="w-full bg-red-600 py-3 rounded-xl font-bold">REGISTRA COSTO</button>
                </div>
                <div id="history-materiali" class="space-y-2"></div>
            </div>
        </div>

        <div id="page-settings" class="page">
            <div class="glass">
                <h3 class="font-bold mb-4">Crea Nuova Sezione</h3>
                <input type="text" id="new-cat-nome" placeholder="Nome (es. Cane, Casa, Moto)">
                <input type="text" id="new-cat-emoji" placeholder="Emoji (es. 🐕, 🏠)">
                <button onclick="creaCategoria()" class="w-full bg-blue-600 py-3 rounded-xl font-bold">AGGIUNGI</button>
            </div>
            <div id="manage-cats" class="mt-4 space-y-2"></div>
        </div>

    </div>

    <nav class="fixed bottom-0 w-full bg-[#1e293b]/95 backdrop-blur-md border-t border-white/10 flex justify-around p-4">
        <button onclick="openPage('page-home')" class="text-2xl">🏠</button>
        <button onclick="openPage('page-settings')" class="text-2xl">⚙️</button>
    </nav>

    <script>
        let categorie = JSON.parse(localStorage.getItem('pro_cats')) || [
            { id: 'legno', nome: 'Legno', emoji: '🪵' },
            { id: 'pc', nome: 'Riparazione PC', emoji: '💻' }
        ];
        let dati = JSON.parse(localStorage.getItem('pro_data')) || [];
        let catAttiva = '';

        function openPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            if(pageId === 'page-home') {
                document.getElementById('sub-title').innerText = "Dashboard Generale";
                renderHome();
            }
        }

        function openSector(id) {
            catAttiva = id;
            const cat = categorie.find(c => c.id === id);
            document.getElementById('sub-title').innerText = "Gestione " + cat.nome;
            openPage('page-sector');
            setSectorTab('bilancio');
        }

        function setSectorTab(tab) {
            document.querySelectorAll('.sector-tab').forEach(t => t.classList.add('hidden'));
            document.getElementById('sector-' + tab).classList.remove('hidden');
            document.querySelectorAll('.sub-nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-tab-' + tab).classList.add('active');
            renderSectorData();
        }

        function salvaItem(tipo) {
            const nome = tipo === 'prodotti' ? document.getElementById('prod-nome').value : document.getElementById('mat-nome').value;
            const cifra = tipo === 'prodotti' ? parseFloat(document.getElementById('prod-prezzo').value) : -parseFloat(document.getElementById('mat-costo').value);
            
            if(nome && cifra) {
                dati.push({ catId: catAttiva, tipo, nome, cifra, data: new Date().toLocaleDateString('it-IT') });
                localStorage.setItem('pro_data', JSON.stringify(dati));
                document.getElementById('prod-nome').value = ''; document.getElementById('prod-prezzo').value = '';
                document.getElementById('mat-nome').value = ''; document.getElementById('mat-costo').value = '';
                renderSectorData();
            }
        }

        function renderHome() {
            const grid = document.getElementById('grid-categorie');
            let global = 0;
            grid.innerHTML = categorie.map(c => {
                const saldo = dati.filter(d => d.catId === c.id).reduce((acc, curr) => acc + curr.cifra, 0);
                global += saldo;
                return `
                    <div onclick="openSector('${c.id}')" class="glass flex justify-between items-center border-l-4 border-blue-500">
                        <div class="flex items-center">
                            <span class="text-3xl mr-4">${c.emoji}</span>
                            <div><p class="font-bold uppercase text-sm">${c.nome}</p><p class="text-xs text-slate-500">Utile: € ${saldo.toFixed(2)}</p></div>
                        </div>
                        <span class="text-blue-500 font-bold">➔</span>
                    </div>
                `;
            }).join('');
            document.getElementById('global-total').innerText = `€ ${global.toFixed(2)}`;
        }

        function renderSectorData() {
            const historyAll = document.getElementById('history-all');
            const historyProd = document.getElementById('history-prodotti');
            const historyMat = document.getElementById('history-materiali');
            
            const catDati = dati.filter(d => d.catId === catAttiva);
            const inVal = catDati.filter(d => d.cifra > 0).reduce((acc, c) => acc + c.cifra, 0);
            const outVal = catDati.filter(d => d.cifra < 0).reduce((acc, c) => acc + c.cifra, 0);

            document.getElementById('cat-in').innerText = `€ ${inVal.toFixed(2)}`;
            document.getElementById('cat-out').innerText = `€ ${Math.abs(outVal).toFixed(2)}`;
            document.getElementById('cat-net').innerText = `€ ${(inVal + outVal).toFixed(2)}`;

            const renderCard = (d) => `
                <div class="glass py-3 px-4 flex justify-between items-center text-xs">
                    <div><p class="font-bold">${d.nome}</p><p class="text-[9px] text-slate-500">${d.data} (${d.tipo})</p></div>
                    <p class="font-bold ${d.cifra > 0 ? 'text-green-400' : 'text-red-400'}">€ ${d.cifra.toFixed(2)}</p>
                </div>
            `;

            historyAll.innerHTML = catDati.slice().reverse().map(renderCard).join('');
            historyProd.innerHTML = catDati.filter(d => d.tipo === 'prodotti').slice().reverse().map(renderCard).join('');
            historyMat.innerHTML = catDati.filter(d => d.tipo === 'materiali').slice().reverse().map(renderCard).join('');
        }

        function creaCategoria() {
            const nome = document.getElementById('new-cat-nome').value;
            const emoji = document.getElementById('new-cat-emoji').value || '📁';
            if(nome) {
                const id = nome.toLowerCase().replace(/\s/g, '');
                categorie.push({ id, nome, emoji });
                localStorage.setItem('pro_cats', JSON.stringify(categorie));
                openPage('page-home');
            }
        }

        renderHome();
    </script>
</body>
</html>
