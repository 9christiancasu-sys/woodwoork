<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Christian Hub Business</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; font-family: sans-serif; color: white; }
        .page { display: none; padding-bottom: 100px; animation: fadeIn 0.2s ease; }
        .page.active { display: block; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 20px; margin-bottom: 12px; }
        input { background: rgba(255, 255, 255, 0.08) !important; border: 1px solid rgba(255, 255, 255, 0.15) !important; color: white !important; padding: 12px; border-radius: 12px; width: 100%; margin-bottom: 10px; font-size: 14px; }
        .sub-nav-btn { padding: 10px; font-size: 11px; font-weight: bold; border-radius: 10px; flex: 1; text-align: center; background: rgba(255,255,255,0.05); color: #94a3b8; }
        .sub-nav-btn.active { background: #3b82f6; color: white; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <header class="p-5 sticky top-0 z-50 bg-[#0f172a]/90 backdrop-blur-md border-b border-white/10 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-bold text-blue-400" id="top-title">Christian Hub</h1>
            <p class="text-[9px] uppercase tracking-tighter text-slate-500" id="sub-title">Dashboard</p>
        </div>
        <div class="text-right">
            <p class="text-[9px] uppercase text-slate-500">Saldo Netto</p>
            <p class="text-xl font-mono font-bold text-green-400" id="global-total">€ 0.00</p>
        </div>
    </header>

    <div class="p-4">
        
        <div id="page-home" class="page active">
            <div id="grid-categorie" class="grid grid-cols-1 gap-3"></div>
        </div>

        <div id="page-sector" class="page">
            <div class="flex gap-1 mb-5 bg-white/5 p-1 rounded-xl" id="sector-nav">
                <button onclick="setSectorTab('bilancio')" class="sub-nav-btn active" id="btn-tab-bilancio">RESOCONTO</button>
                <button onclick="setSectorTab('prodotti')" class="sub-nav-btn" id="btn-tab-prodotti">+ VENDITA</button>
                <button onclick="setSectorTab('materiali')" class="sub-nav-btn" id="btn-tab-materiali">+ SPESE</button>
            </div>

            <div id="sector-bilancio" class="sector-tab">
                <div class="glass flex justify-around text-center py-4">
                    <div><p class="text-[9px] text-slate-500">RICAVI</p><p class="text-green-400 font-bold text-sm" id="cat-in">€ 0</p></div>
                    <div><p class="text-[9px] text-slate-500">COSTI</p><p class="text-red-400 font-bold text-sm" id="cat-out">€ 0</p></div>
                    <div><p class="text-[9px] text-slate-500">UTILE</p><p class="text-blue-400 font-bold text-sm" id="cat-net">€ 0</p></div>
                </div>
                <div id="history-all" class="space-y-2"></div>
            </div>

            <div id="sector-prodotti" class="sector-tab hidden">
                <div class="glass">
                    <h3 class="font-bold mb-3 text-sm text-blue-400 text-center uppercase">Registra Nuovo Lavoro</h3>
                    <input type="text" id="prod-nome" placeholder="Nome (es. Tavolo in Pino)">
                    <input type="number" id="prod-prezzo" placeholder="Prezzo Venduto (€)">
                    <input type="number" id="prod-costo-mat" placeholder="Costo materiali per questo lavoro (€)">
                    <button onclick="salvaVendita()" class="w-full bg-blue-600 py-4 rounded-xl font-bold mt-2 shadow-lg">SALVA VENDITA</button>
                </div>
            </div>

            <div id="sector-materiali" class="sector-tab hidden">
                <div class="glass">
                    <h3 class="font-bold mb-3 text-sm text-red-400 text-center uppercase">Spesa Materiali / Altro</h3>
                    <input type="text" id="mat-nome" placeholder="Descrizione (es. Set di punte, Colla)">
                    <input type="number" id="mat-costo" placeholder="Costo (€)">
                    <button onclick="salvaSpesaGenerica()" class="w-full bg-red-600 py-4 rounded-xl font-bold mt-2 shadow-lg">REGISTRA COSTO</button>
                </div>
            </div>
        </div>

        <div id="page-settings" class="page">
            <div class="glass">
                <h3 class="font-bold mb-4 text-center">Gestione Sezioni</h3>
                <input type="text" id="new-cat-nome" placeholder="Nome (es. Casa, Moto, Cane)">
                <input type="text" id="new-cat-emoji" placeholder="Emoji (es. 🏠, 🐕)">
                <button onclick="creaCategoria()" class="w-full bg-blue-600 py-3 rounded-xl font-bold">AGGIUNGI SEZIONE</button>
            </div>
            <div id="manage-cats" class="space-y-2 mt-4"></div>
        </div>
    </div>

    <nav class="fixed bottom-0 w-full bg-[#0f172a]/95 backdrop-blur-md border-t border-white/10 flex justify-around p-4">
        <button onclick="openPage('page-home')" class="text-2xl">🏠</button>
        <button onclick="openPage('page-settings')" class="text-2xl">⚙️</button>
    </nav>

    <script>
        let categorie = JSON.parse(localStorage.getItem('biz_cats')) || [
            { id: 'legno', nome: 'Legno', emoji: '🪵' },
            { id: 'pc', nome: 'Riparazione PC', emoji: '💻' }
        ];
        let movimenti = JSON.parse(localStorage.getItem('biz_movs')) || [];
        let catAttiva = '';

        function openPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'page-home') { renderHome(); document.getElementById('sub-title').innerText = "Dashboard"; }
            if(id === 'page-settings') renderSettings();
        }

        function openSector(id) {
            catAttiva = id;
            const cat = categorie.find(c => c.id === id);
            document.getElementById('sub-title').innerText = "Gestione " + cat.nome;
            openPage('page-sector');
            setSectorTab('bilancio');
        }

        function setSectorTab(tab) {
            document.querySelectorAll('.sector-tab').forEach(t => t.classList.add('hidden'));
            document.getElementById('sector-' + tab).classList.remove('hidden');
            document.querySelectorAll('.sub-nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-tab-' + tab).classList.add('active');
            renderSectorData();
        }

        function salvaVendita() {
            const nome = document.getElementById('prod-nome').value;
            const ricavo = parseFloat(document.getElementById('prod-prezzo').value) || 0;
            const costo = parseFloat(document.getElementById('prod-costo-mat').value) || 0;
            if(nome && ricavo >= 0) {
                movimenti.push({ catId: catAttiva, tipo: 'lavoro', nome, ricavo, costo, data: new Date().toLocaleDateString('it-IT'), id: Date.now() });
                salvaTutto();
                ['prod-nome', 'prod-prezzo', 'prod-costo-mat'].forEach(i => document.getElementById(i).value = '');
                setSectorTab('bilancio');
            }
        }

        function salvaSpesaGenerica() {
            const nome = document.getElementById('mat-nome').value;
            const costo = parseFloat(document.getElementById('mat-costo').value) || 0;
            if(nome && costo > 0) {
                movimenti.push({ catId: catAttiva, tipo: 'spesa', nome, ricavo: 0, costo, data: new Date().toLocaleDateString('it-IT'), id: Date.now() });
                salvaTutto();
                ['mat-nome', 'mat-costo'].forEach(i => document.getElementById(i).value = '');
                setSectorTab('bilancio');
            }
        }

        function eliminaMovimento(id) {
            if(confirm("Vuoi eliminare questa voce?")) {
                movimenti = movimenti.filter(m => m.id !== id);
                salvaTutto();
                renderSectorData();
            }
        }

        function salvaTutto() {
            localStorage.setItem('biz_movs', JSON.stringify(movimenti));
            localStorage.setItem('biz_cats', JSON.stringify(categorie));
            renderHome();
        }

        function renderHome() {
            const grid = document.getElementById('grid-categorie');
            let globalNet = 0;
            grid.innerHTML = categorie.map(c => {
                const m = movimenti.filter(mov => mov.catId === c.id);
                const netto = m.reduce((acc, curr) => acc + (curr.ricavo - curr.costo), 0);
                globalNet += netto;
                return `
                    <div onclick="openSector('${c.id}')" class="glass flex justify-between items-center border-l-4 border-blue-500 active:scale-95 transition">
                        <div class="flex items-center">
                            <span class="text-3xl mr-4">${c.emoji}</span>
                            <div><p class="font-bold uppercase text-xs">${c.nome}</p><p class="text-xs text-green-400 font-mono">€ ${netto.toFixed(2)}</p></div>
                        </div>
                        <span class="text-slate-600">➔</span>
                    </div>`;
            }).join('');
            document.getElementById('global-total').innerText = `€ ${globalNet.toFixed(2)}`;
        }

        function renderSectorData() {
            const box = document.getElementById('history-all');
            const dataCat = movimenti.filter(m => m.catId === catAttiva);
            const r = dataCat.reduce((a, b) => a + b.ricavo, 0);
            const c = dataCat.reduce((a, b) => a + b.costo, 0);

            document.getElementById('cat-in').innerText = `€ ${r.toFixed(2)}`;
            document.getElementById('cat-out').innerText = `€ ${c.toFixed(2)}`;
            document.getElementById('cat-net').innerText = `€ ${(r - c).toFixed(2)}`;

            box.innerHTML = dataCat.slice().reverse().map(m => `
                <div class="glass p-3 flex justify-between items-center" onclick="eliminaMovimento(${m.id})">
                    <div>
                        <p class="font-bold text-xs">${m.nome}</p>
                        <p class="text-[9px] text-slate-500">${m.data} ${m.tipo === 'lavoro' ? '(Vendita)' : '(Spesa)'}</p>
                    </div>
                    <div class="text-right">
                        <p class="font-bold text-xs ${m.ricavo > 0 ? 'text-green-400' : 'text-red-400'}">€ ${(m.ricavo - m.costo).toFixed(2)}</p>
                        ${m.tipo === 'lavoro' ? `<p class="text-[8px] text-slate-500">M: €${m.costo}</p>` : ''}
                    </div>
                </div>
            `).join('');
        }

        function creaCategoria() {
            const n = document.getElementById('new-cat-nome').value;
            const e = document.getElementById('new-cat-emoji').value || '📁';
            if(n) {
                categorie.push({ id: n.toLowerCase().replace(/\s/g,''), nome: n, emoji: e });
                salvaTutto();
                openPage('page-home');
            }
        }

        function renderSettings() {
            const list = document.getElementById('manage-cats');
            list.innerHTML = categorie.map(c => `
                <div class="glass flex justify-between p-3 items-center">
                    <span>${c.emoji} ${c.nome}</span>
                    <button onclick="rimuoviCat('${c.id}')" class="text-red-500 text-xs font-bold">RIMUOVI</button>
                </div>`).join('');
        }

        function rimuoviCat(id) {
            if(confirm("Rimuovere categoria e tutti i dati relativi?")) {
                categorie = categorie.filter(c => c.id !== id);
                movimenti = movimenti.filter(m => m.catId !== id);
                salvaTutto(); renderSettings();
            }
        }

        renderHome();
    </script>
</body>
</html>
