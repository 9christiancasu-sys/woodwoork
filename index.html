<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Christian Hub Dynamic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; font-family: sans-serif; color: white; }
        .tab-content { display: none; padding-bottom: 100px; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 20px; margin-bottom: 15px; }
        input { background: rgba(255, 255, 255, 0.1) !important; border: 1px solid rgba(255, 255, 255, 0.2) !important; color: white !important; padding: 12px; border-radius: 12px; width: 100%; margin-bottom: 10px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <header class="p-6 sticky top-0 z-50 bg-[#0f172a]/80 backdrop-blur-md border-b border-white/10 flex justify-between items-end">
        <div>
            <p class="text-slate-400 text-xs uppercase tracking-widest">Christian Hub</p>
            <h1 class="text-2xl font-bold" id="nav-title">Dashboard</h1>
        </div>
        <div class="text-right">
            <p class="text-slate-400 text-[10px] uppercase">Saldo Totale</p>
            <p class="text-2xl font-mono font-bold text-green-400" id="total-badge">€ 0.00</p>
        </div>
    </header>

    <div class="p-4">
        <div id="tab-home" class="tab-content active">
            <div id="grid-categorie" class="grid grid-cols-1 gap-4 mt-4">
                </div>
        </div>

        <div id="tab-categoria" class="tab-content">
            <div class="glass-card">
                <h3 id="cat-form-title" class="font-bold mb-4 flex items-center text-blue-400">Nuova Voce</h3>
                <input type="text" id="item-nome" placeholder="Descrizione">
                <input type="number" id="item-guadagno" placeholder="Entrata / Manodopera (€)">
                <input type="number" id="item-costi" placeholder="Uscita / Costi pezzi (€)">
                <button onclick="salvaVoce()" class="w-full bg-blue-600 py-4 rounded-xl font-bold mt-2 shadow-lg">SALVA</button>
            </div>
            <div id="lista-voci" class="space-y-3"></div>
        </div>

        <div id="tab-settings" class="tab-content">
            <div class="glass-card">
                <h3 class="text-orange-400 font-bold mb-4">Aggiungi Nuova Categoria</h3>
                <input type="text" id="new-cat-nome" placeholder="Nome (es. Cane, Casa)">
                <input type="text" id="new-cat-emoji" placeholder="Emoji (es. 🐕, 🏠)">
                <button onclick="aggiungiCategoria()" class="w-full bg-orange-600 py-3 rounded-xl font-bold mt-2">CREA CATEGORIA</button>
            </div>
            <div id="lista-categorie-settings" class="space-y-2">
                </div>
        </div>
    </div>

    <nav class="fixed bottom-0 w-full bg-[#1e293b]/90 backdrop-blur-md border-t border-white/10 flex justify-around p-4 shadow-2xl">
        <button onclick="openHome()" class="text-2xl">🏠</button>
        <button onclick="openTab('tab-settings', 'Impostazioni')" class="text-2xl">⚙️</button>
    </nav>

    <script>
        // Dati iniziali di default
        let defaultCats = [
            { id: 'legno', nome: 'Legno', emoji: '🪵', colore: 'amber' },
            { id: 'pc', nome: 'Riparazione PC', emoji: '💻', colore: 'blue' }
        ];

        let categorie = JSON.parse(localStorage.getItem('hub_categorie')) || defaultCats;
        let movimenti = JSON.parse(localStorage.getItem('hub_movimenti')) || [];
        let categoriaAttiva = '';

        function openHome() {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-home').classList.add('active');
            document.getElementById('nav-title').innerText = 'Dashboard';
            renderHome();
        }

        function openTab(id, title) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('nav-title').innerText = title;
            if(id === 'tab-settings') renderSettings();
        }

        function openCategoria(id) {
            categoriaAttiva = id;
            const cat = categorie.find(c => c.id === id);
            openTab('tab-categoria', cat.nome);
            document.getElementById('cat-form-title').innerText = `Nuova voce ${cat.emoji}`;
            renderVoci();
        }

        function aggiungiCategoria() {
            const nome = document.getElementById('new-cat-nome').value;
            const emoji = document.getElementById('new-cat-emoji').value || '📁';
            if(nome) {
                const id = nome.toLowerCase().replace(/\s/g, '');
                categorie.push({ id, nome, emoji });
                localStorage.setItem('hub_categorie', JSON.stringify(categorie));
                document.getElementById('new-cat-nome').value = '';
                document.getElementById('new-cat-emoji').value = '';
                renderSettings();
            }
        }

        function eliminaCategoria(id) {
            if(confirm("Eliminare la categoria e tutti i suoi dati?")) {
                categorie = categorie.filter(c => c.id !== id);
                movimenti = movimenti.filter(m => m.catId !== id);
                localStorage.setItem('hub_categorie', JSON.stringify(categorie));
                localStorage.setItem('hub_movimenti', JSON.stringify(movimenti));
                renderSettings();
            }
        }

        function salvaVoce() {
            const nome = document.getElementById('item-nome').value;
            const entrata = parseFloat(document.getElementById('item-guadagno').value) || 0;
            const uscita = parseFloat(document.getElementById('item-costi').value) || 0;
            
            if(nome) {
                movimenti.push({
                    catId: categoriaAttiva,
                    nome,
                    valore: entrata - uscita,
                    data: new Date().toLocaleDateString('it-IT')
                });
                localStorage.setItem('hub_movimenti', JSON.stringify(movimenti));
                document.getElementById('item-nome').value = '';
                document.getElementById('item-guadagno').value = '';
                document.getElementById('item-costi').value = '';
                renderVoci();
            }
        }

        function renderHome() {
            const grid = document.getElementById('grid-categorie');
            let totaleGlobale = 0;
            
            grid.innerHTML = categorie.map(cat => {
                const saldoCat = movimenti.filter(m => m.catId === cat.id).reduce((acc, curr) => acc + curr.valore, 0);
                totaleGlobale += saldoCat;
                return `
                    <button onclick="openCategoria('${cat.id}')" class="glass-card flex items-center justify-between border-l-4 border-blue-500">
                        <div class="flex items-center">
                            <span class="text-3xl mr-4">${cat.emoji}</span>
                            <div class="text-left">
                                <p class="font-bold text-lg">${cat.nome.toUpperCase()}</p>
                                <p class="text-xs text-slate-400 text-green-400">€ ${saldoCat.toFixed(2)}</p>
                            </div>
                        </div>
                        <span class="text-slate-600">➔</span>
                    </button>
                `;
            }).join('');
            document.getElementById('total-badge').innerText = `€ ${totaleGlobale.toFixed(2)}`;
        }

        function renderVoci() {
            const lista = document.getElementById('lista-voci');
            const filtered = movimenti.filter(m => m.catId === categoriaAttiva);
            lista.innerHTML = filtered.map((m, i) => `
                <div class="glass-card flex justify-between items-center py-3">
                    <div onclick="eliminaVoce(${movimenti.indexOf(m)})">
                        <p class="font-bold text-sm">${m.nome}</p>
                        <p class="text-[10px] text-slate-500">${m.data}</p>
                    </div>
                    <p class="font-bold ${m.valore >= 0 ? 'text-green-400' : 'text-red-400'}">€ ${m.valore.toFixed(2)}</p>
                </div>
            `).reverse().join('');
        }

        function eliminaVoce(index) {
            if(confirm("Eliminare questa voce?")) {
                movimenti.splice(index, 1);
                localStorage.setItem('hub_movimenti', JSON.stringify(movimenti));
                renderVoci();
            }
        }

        function renderSettings() {
            const lista = document.getElementById('lista-categorie-settings');
            lista.innerHTML = categorie.map(cat => `
                <div class="flex justify-between items-center p-3 bg-white/5 rounded-lg">
                    <span>${cat.emoji} ${cat.nome}</span>
                    <button onclick="eliminaCategoria('${cat.id}')" class="text-red-500 text-xs">ELIMINA</button>
                </div>
            `).join('');
        }

        renderHome();
    </script>
</body>
</html>
